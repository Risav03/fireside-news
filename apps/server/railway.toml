# Railway config for the @repo/server service.
#
# In the Railway service UI:
# - Leave "Root Directory" empty (repository root). Shared packages under packages/
#   must stay on disk; setting Root Directory to apps/server alone will break file:
#   workspace links.
# - Set "Config as code" path to: apps/server/railway.toml (if not auto-detected).

[build]
builder = "RAILPACK"
watchPatterns = [
  "apps/server/**",
  "packages/core/**",
  "packages/db/**",
  "packages/queue/**",
  "packages/utils/**",
  "package.json",
  "bun.lock",
  "turbo.json",
  "tsconfig.base.json",
]
# Railpack may run npm first and leave a package-lock.json; Bun 1.3+ can "migrate"
# from it and break workspace file: links (/core, /db, …). Drop it and use bun.lock only.
buildCommand = "rm -f package-lock.json && bun install --frozen-lockfile"

[deploy]
startCommand = "bun --filter @repo/server start"
